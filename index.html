        description: "你是纯粹的美好本身。你的可爱不是刻意为之，而是由内而外散发出来的温柔气质。你智商在线，情商拉满，从不卖队友，说话有条有理。你是团队中的定海神针，是所有人心里那个「有他在就安心了」的人。<br><br>你可能不是最耀眼的那一个，但你绝对是最不可或缺的那一个。你像一杯温水，不会烫到人，也不会冷到人，永远在最适合的温度。和你相处是一种享受，离开你会觉得少了什么。<br><br>建议：继续保持，你是这个混沌世界里的稀缺物种。但也要记得照顾自己，别总把温柔留给别人。"
    },
    SHIT: {
        name: "答辩t神",
        subtitle: "千年一遇的没有用，队友的噩梦",
        traits: ["内鬼", "零贡献", "拖后腿", "视队友为无物", "行走的灾难"],
        description: "你是一坨行走的……算了，你的名字已经说明了一切。你视队友为草芥，卖队友的速度比打敌人还快。你在团队中的存在感基本为零——不对，是负数。因为你不仅不贡献，还会主动从内部瓦解团队的战斗力。<br><br>团战你第一个跑，资源你第一个抢，锅你第一个甩。如果有一天你的队友们集体消失，不要惊讶，他们只是终于做出了正确的选择——远离你。<br><br>建议：认真反思。非常认真非常认真地反思。如果反思不出来为什么，那说明问题比你想的还严重。"
    },
    CHUNT: {
        name: " 傻逼t神",
        subtitle: "说话毫无逻辑，活在自己的世界里",
        traits: ["逻辑断裂", "脑回路清奇", "自成一派", "谜语人", "思维跳跃"],
        description: "你的大脑运作方式至今是个未解之谜。你说出的话前后矛盾、逻辑断裂，有时候连你自己都不知道自己在说什么。但神奇的是，你似乎对此毫无察觉，还觉得自己说得挺有道理。<br><br>你活在属于自己的逻辑世界里，那个世界的规则和现实世界完全不兼容。和你聊天就像在做阅读理解，而且是没有标准答案、没有提示、连题目都可能看错的那种。你的思维跳跃程度堪比量子力学。<br><br>建议：尝试在说话之前先想三秒。就三秒。如果三秒之后你还是不知道自己要说什么，那就……再想三秒。"
    },
    COOLT: {
        name: "帅哥t神",
        subtitle: "颜值拉满，智商拉胯，帅但蠢的完美样本",
        traits: ["颜值担当", "花瓶", "帅但蠢", "靠脸吃饭", "万人迷"],
        description: "你长了一张让人心动的脸，但你的智商实在配不上你的颜值。你是团队中的「好看但不中用」代表，每次出场都能引起一阵惊叹，然后迅速用实际行动让所有人从惊艳变成无奈。<br><br>但神奇的是，即使你做了一件很蠢的事，大家看在你脸的份上还是选择原谅你。这就是颜值的力量，不公平但真实存在。你靠着脸在团队中获得了远超你实际能力的容忍度。<br><br>建议：好好保养你的脸，这是你最大的资产。同时建议培养一个不需要动脑的爱好，因为你一动脑就容易出事。"
    },
    SEXT: {
        name: "魅魔t神",
        subtitle: "没有人能阻挡你的魅力，没有人",
        traits: ["万人迷", "魅力溢出", "情商在线", "致命吸引力", "让人沦陷"],
        description: "没有人能抵挡你的魅力，真的没有人。你的一举一动都散发着让人无法抗拒的吸引力，你的情商很高，知道什么时候该说什么话，什么场合该做什么事。你在人群中就像一块强力磁铁，所有人都会不自觉地被你吸引。<br><br>如果魅力是一门武功，你就是宗师级别。你甚至不需要刻意表现，一个眼神、一句话就能让人心跳加速。你的存在本身就是一种危险品，需要贴上「可能造成心智沦陷」的警告标签。<br><br>建议：注意你的魅力辐射范围，避免误伤无辜群众。同时记得——魅力虽好，但也不要滥用。"
    },
    TGOD: {
        name: "千年一遇的真神t神",
        subtitle: "全能之王，T神人格的天花板",
        traits: ["全能", "完美", "王者", "千年一遇", "降维打击"],
        description: "你就是传说中千年一遇的存在。可爱？有，而且恰到好处。智商？在线，而且高于常人。情商？拉满，让人如沐春风。魅力？溢出，走到哪里都是焦点。逻辑？清晰，说话做事滴水不漏。<br><br>你是所有T神人格中最接近完美的存在，是千分之一概率才能出现的真神。你的队友以你为荣，你的对手以你为目标，你的敌人……好吧你没有敌人，因为你强大到让人只能敬佩。<br><br>建议：请收下我的膝盖。然后继续保持你的完美，给这个不完美的世界一点希望。但记住，高处不胜寒，偶尔也展现一下小缺点，不然真的太不真实了。"
    }
};

const resultMeta = {
    NAIT:  { color: "#f97316", label: "NAIT" },
    TANGT: { color: "#eab308", label: "TANGT" },
    CT:    { color: "#3b82f6", label: "CT" },
    SHIT:  { color: "#78716c", label: "SHIT" },
    CHUNT: { color: "#22c55e", label: "CHUNT" },
    COOLT: { color: "#06b6d4", label: "COOLT" },
    SEXT:  { color: "#ec4899", label: "SEXT" },
    TGOD:  { color: "#f43f5e", label: "TGOD" }
};

const dimNames = { cute:"可爱值", stupid:"弱智程度", betray:"卖队友程度", lowEQ:"低情商", illogical:"无逻辑", charm:"魅力值", annoying:"讨厌度" };
const dimBars = { cute:"bar-cute", stupid:"bar-stupid", betray:"bar-betray", lowEQ:"bar-lowEQ", illogical:"bar-illogical", charm:"bar-charm", annoying:"bar-annoying" };
const dimOrder = ["cute","stupid","betray","lowEQ","illogical","charm","annoying"];

// ===================== STATE =====================
let currentQ = 0;
let scores = { cute:50, stupid:50, betray:50, lowEQ:50, illogical:50, charm:50, annoying:50 };

// ===================== FUNCTIONS =====================
function switchScreen(id) {
    ["welcome","question-screen","loading-screen","result-screen"].forEach(s => {
        document.getElementById(s).classList.add("hidden");
    });
    document.getElementById(id).classList.remove("hidden");
    window.scrollTo({top:0,behavior:"smooth"});
}

function startTest() {
    currentQ = 0;
    scores = { cute:50, stupid:50, betray:50, lowEQ:50, illogical:50, charm:50, annoying:50 };
    switchScreen("question-screen");
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentQ];
    const pct = Math.round((currentQ + 1) / questions.length * 100);
    document.getElementById("q-num").textContent = currentQ + 1;
    document.getElementById("q-pct").textContent = pct + "%";
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("q-text").textContent = q.text;
    const letters = ["A","B","C","D"];
    document.getElementById("q-options").innerHTML = q.options.map((o,i) => `
        <button onclick="selectOption(${i})" class="option-btn w-full text-left px-5 py-4 rounded-lg flex items-center gap-4 group">
            <span class="shrink-0 w-8 h-8 rounded-md bg-neutral-800 flex items-center justify-center text-xs text-neutral-400 font-medium group-hover:bg-rose-500/10 group-hover:text-rose-400 transition-colors">${letters[i]}</span>
            <span class="text-sm text-neutral-300 group-hover:text-white transition-colors leading-relaxed">${o.text}</span>
        </button>
    `).join("");
}

function selectOption(idx) {
    const opt = questions[currentQ].options[idx];
    Object.entries(opt.s).forEach(([k,v]) => { scores[k] += v; });
    currentQ++;
    if (currentQ >= questions.length) {
        showLoading();
    } else {
        const area = document.getElementById("q-area");
        area.style.opacity = "0";
        area.style.transform = "translateX(-20px)";
        setTimeout(() => {
            renderQuestion();
            area.style.opacity = "1";
            area.style.transform = "translateX(0)";
        }, 280);
    }
}

function showLoading() {
    switchScreen("loading-screen");
    const msgs = [
        "正在连接T神数据库……",
        "分析你的呆傻程度……",
        "计算卖队友概率……",
        "评估无逻辑指数……",
        "生成你的T神人格……"
    ];
    let i = 0;
    const el = document.getElementById("loading-text");
    el.textContent = msgs[0];
    const iv = setInterval(() => {
        i++;
        if (i < msgs.length) {
            el.style.opacity = "0";
            setTimeout(() => { el.textContent = msgs[i]; el.style.opacity = "1"; }, 200);
        } else {
            clearInterval(iv);
            const type = calcResult();
            setTimeout(() => showResult(type), 400);
        }
    }, 700);
}

function calcResult() {
    const s = scores;
    if (s.charm >= 75 && s.stupid <= 45 && s.betray <= 50 && s.lowEQ <= 45 && s.illogical <= 50 && s.cute >= 50) return "TGOD";
    if (s.charm >= 80 && s.lowEQ <= 48 && s.stupid <= 50) return "SEXT";
    if (s.cute >= 68 && s.stupid <= 45 && s.betray <= 50 && s.lowEQ <= 48) return "CT";
    if (s.charm >= 60 && s.stupid >= 52 && s.cute >= 50) return "COOLT";
    if (s.cute >= 60 && s.stupid >= 55) return "NAIT";
    if (s.illogical >= 68) return "CHUNT";
    if (s.betray >= 62 && s.annoying >= 55) return "SHIT";
    if (s.stupid >= 60 && s.annoying >= 55) return "TANGT";
    return "NAIT";
}

function showResult(type) {
    const r = results[type];
    const m = resultMeta[type];
    const c = m.color;

    let dimHTML = "";
    dimOrder.forEach((d,i) => {
        const v = Math.max(0, Math.min(100, Math.round(scores[d])));
        dimHTML += `
        <div class="flex items-center gap-3 anim-fade" style="animation-delay:${.9+i*.1}s">
            <span class="text-[11px] text-neutral-500 w-[72px] text-right shrink-0">${dimNames[d]}</span>
            <div class="flex-1 h-[6px] bg-neutral-800 rounded-full overflow-hidden">
                <div class="h-full rounded-full ${dimBars[d]} anim-bar" style="width:${v}%;animation-delay:${1.1+i*.1}s"></div>
            </div>
            <span class="text-[11px] text-neutral-400 w-9 text-right font-mono">${v}</span>
        </div>`;
    });

    let tagsHTML = r.traits.map(t =>
        `<span class="px-3 py-1 rounded-full text-[11px]" style="border:1px solid ${c}33;color:${c};background:${c}0d">${t}</span>`
    ).join("");

    // Find top 2 dimensions
    const sorted = dimOrder.slice().sort((a,b) => scores[b] - scores[a]);
    const topDim = dimNames[sorted[0]];
    const topVal = Math.max(0,Math.min(100,Math.round(scores[sorted[0]])));
    const secDim = dimNames[sorted[1]];
    const secVal = Math.max(0,Math.min(100,Math.round(scores[sorted[1]])));

    document.getElementById("result-content").innerHTML = `
        <div class="text-center">
            <div class="anim-clip inline-flex items-center gap-2 px-4 py-2 rounded-full text-[10px] tracking-widest uppercase mb-8" style="border:1px solid ${c}33;background:${c}0d;color:${c}">
                <span class="w-2 h-2 rounded-full" style="background:${c}"></span>
                你的T神人格
            </div>

            <!-- ★ 图片占位：结果主图 ★ -->
            <div class="anim-clip d1 img-placeholder w-44 h-44 md:w-52 md:h-52 rounded-2xl mx-auto mb-8 flex flex-col items-center justify-center gap-2" style="animation:float 4s ease-in-out infinite">
                <span class="iconify text-neutral-600" data-icon="solar:gallery-add-linear" data-width="28"></span>
                <span class="text-[10px] text-neutral-600 leading-tight text-center px-4">插入「${r.name}」<br>代表图片</span>
            </div>

            <div class="anim-clip d2 text-6xl md:text-8xl font-semibold tracking-tighter mb-2" style="color:${c}">${type}</div>
            <h2 class="anim-clip d3 text-xl md:text-2xl font-medium tracking-tight mb-2">${r.name}</h2>
            <p class="anim-fade d4 text-sm text-neutral-500 mb-6">${r.subtitle}</p>
            <div class="anim-fade d5 flex flex-wrap justify-center gap-2 mb-4">
                ${tagsHTML}
            </div>
            <p class="anim-fade d5 text-[11px] text-neutral-600 mb-10">
                核心维度：${topDim} ${topVal}% · ${secDim} ${secVal}%
            </p>
        </div>

        <!-- ★ 图片占位：横幅配图 ★ -->
        <div class="anim-fade d7 img-placeholder w-full h-36 md:h-44 rounded-xl mb-10 flex flex-col items-center justify-center gap-2">
            <span class="iconify text-neutral-600" data-icon="solar:gallery-wide-linear" data-width="28"></span>
            <span class="text-[10px] text-neutral-600">插入「${r.name}」场景/横幅图片</span>
        </div>

        <!-- Description -->
        <div class="anim-fade d7 rounded-xl p-6 md:p-8 mb-8" style="background:#0a0a0a;border:1px solid #262626">
            <h3 class="text-xs tracking-widest uppercase text-neutral-500 mb-4 flex items-center gap-2">
                <span class="iconify" data-icon="solar:document-text-linear" data-width="14"></span>
                人格解读
            </h3>
            <div class="text-sm text-neutral-300 leading-[1.8]">${r.description}</div>
        </div>

        <!-- Dimension Bars -->
        <div class="anim-fade d10 rounded-xl p-6 md:p-8 mb-10" style="background:#0a0a0a;border:1px solid #262626">
            <h3 class="text-xs tracking-widest uppercase text-neutral-500 mb-6 flex items-center gap-2">
                <span class="iconify" data-icon="solar:chart-2-linear" data-width="14"></span>
                七维分析
            </h3>
            <div class="space-y-3">${dimHTML}</div>
        </div>

        <!-- Actions -->
        <div class="anim-fade d10 flex flex-col sm:flex-row items-center justify-center gap-4">
            <button onclick="restart()" class="px-8 py-4 bg-white text-black text-xs font-medium tracking-widest uppercase rounded-sm hover:bg-rose-500 hover:text-white transition-all duration-300">
                重新测试
            </button>
            <button onclick="copyResult('${type}','${r.name}')" id="copy-btn" class="px-8 py-4 text-xs font-medium tracking-widest uppercase rounded-sm border border-neutral-800 text-neutral-400 hover:border-neutral-600 hover:text-white transition-all duration-300">
                复制结果
            </button>
        </div>

        <p class="anim-fade d10 text-center mt-8 text-[10px] text-neutral-600">
            * 本测试纯属娱乐，结果不代表任何真实评价<br>测试你的朋友们，看看谁是真正的T神
        </p>
    `;
    switchScreen("result-screen");
}

function restart() {
    switchScreen("welcome");
}

function copyResult(type, name) {
    const text = `我的TSTI人格是 ${type}（${name}）！快来测测你的T神人格吧~`;
    navigator.clipboard.writeText(text).then(() => {
        showToast("已复制到剪贴板 ✓");
    }).catch(() => {
        showToast("复制失败，请手动复制");
    });
}

function showToast(msg) {
    const old = document.querySelector(".toast");
    if (old) old.remove();
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
        t.style.opacity = "0";
        t.style.transition = "opacity .3s";
        setTimeout(() => t.remove(), 300);
    }, 2000);
}
</script>
</body>
</html>
